# Configuration Netlify — économie-carburant.fr
# Site HTML statique pur, aucun build nécessaire.

[build]
  publish = "."

# Headers de sécurité (remplace le .htaccess Apache)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache long pour CSS / JS (immuables)
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirection www -> non-www
[[redirects]]
  from = "https://www.economie-carburant.fr/*"
  to = "https://economie-carburant.fr/:splat"
  status = 301
  force = true
